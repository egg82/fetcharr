# Entirely written by ChatGPT

name: Build and publish release container

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: fetcharr

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven credentials for Reposilite
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>egg82-repo-releases</id>
                <username>${env.REPOSILITE_USERNAME}</username>
                <password>${env.REPOSILITE_TOKEN}</password>
              </server>
              <server>
                <id>egg82-repo-snapshots</id>
                <username>${env.REPOSILITE_USERNAME}</username>
                <password>${env.REPOSILITE_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          REPOSILITE_USERNAME: ${{ vars.REPOSILITE_USERNAME }}
          REPOSILITE_TOKEN: ${{ secrets.REPOSILITE_TOKEN }}

      - name: Build everything and deploy allowed Maven artifacts
        run: >
          mvn -B -ntp clean deploy -DdeployAtEnd=true
          -DaltReleaseDeploymentRepository=egg82-repo-releases::https://repo.egg82.me/releases/
          -DaltSnapshotDeploymentRepository=egg82-repo-snapshots::https://repo.egg82.me/snapshots/

      - name: Find main JAR
        id: jar
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob

          candidates=()
          for f in ./App/target/*.jar; do
            name="$(basename "$f")"
            case "$name" in
              *-sources.jar|*-javadoc.jar|*-javadoc-resources.jar|*-test-javadoc-resources.jar|original-*.jar)
                continue
                ;;
              *)
                candidates+=("$f")
                ;;
            esac
          done

          if (( ${#candidates[@]} == 0 )); then
            echo "No usable JAR found in ./App/target" >&2
            exit 1
          fi

          jar_file="$(printf '%s\n' "${candidates[@]}" | awk -F/ '{print length($NF), $0}' | sort -n | head -n1 | cut -d' ' -f2-)"
          echo "jar_file=$jar_file" >> "$GITHUB_OUTPUT"

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/ppc64le
          build-args: |
            JAR_FILE=${{ steps.jar.outputs.jar_file }}
          tags: |
            docker.io/egg82/fetcharr:${{ steps.version.outputs.version }}
            docker.io/egg82/fetcharr:latest
            ghcr.io/${{ github.repository_owner }}/fetcharr:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/fetcharr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
